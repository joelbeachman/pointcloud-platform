<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gaussian Splat Viewer – Point Cloud Platform</title>
  <link rel="stylesheet" href="/css/portal.css">
  <style>
    body { margin: 0; overflow: hidden; background: #0d1117; }
    #splat-container {
      position: absolute; inset: 0; top: 100px;
      width: 100%; height: calc(100vh - 100px);
    }
    .toolbar-label { color: #8b949e; font-size: 0.8rem; }
    #hud {
      position: absolute; right: 12px; top: 112px;
      background: rgba(22,27,34,0.9); border: 1px solid #30363d;
      border-radius: 8px; padding: 0.6rem 0.9rem;
      font-size: 0.8rem; color: #8b949e; z-index: 20;
    }
    #hud strong { color: #a371f7; display: block; margin-bottom: 0.3rem; }
    #overlay {
      position: absolute; inset: 0; top: 100px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #e6edf3; z-index: 30; pointer-events: none;
    }
    #overlay h3 { margin-bottom: 0.5rem; }
    #overlay p { color: #8b949e; font-size: 0.875rem; text-align: center; max-width: 400px; }
    .progress-wrap { width: 260px; height: 3px; background: #21262d; border-radius: 2px; margin-top: 1rem; }
    .progress-fill { height: 3px; background: #a371f7; border-radius: 2px; transition: width 0.3s; }
    #controls-hint {
      position: absolute; left: 12px; bottom: 12px;
      background: rgba(22,27,34,0.85); border: 1px solid #30363d;
      border-radius: 6px; padding: 0.4rem 0.7rem;
      font-size: 0.75rem; color: #8b949e; z-index: 20; pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"><span class="logo-icon">&#9729;</span><span class="logo-text">Point Cloud Platform</span></div>
    <nav>
      <a href="/">Datasets</a>
      <a href="/viewers/potree.html">Point Cloud</a>
      <a href="/viewers/cesium.html">Cesium</a>
      <a href="/viewers/splat.html" class="active">Splat</a>
      <a href="/viewers/panorama.html">Panorama</a>
      <a href="/viewers/compare.html">Compare</a>
    </nav>
  </header>

  <div class="viewer-toolbar">
    <span class="viewer-title">Gaussian Splat Viewer</span>
    <span class="toolbar-label">Dataset:</span>
    <select id="dataset-select"><option value="">Loading...</option></select>
  </div>

  <div id="splat-container"></div>

  <div id="hud">
    <strong id="hud-name">No dataset loaded</strong>
    <div id="hud-status"></div>
  </div>
  <div id="controls-hint">Left drag: orbit &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; Right drag: pan</div>

  <div id="overlay">
    <h3 id="overlay-title">Gaussian Splat Viewer</h3>
    <p id="overlay-msg">Select a splat dataset above to begin.</p>
    <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  </div>

  <!-- Three.js required by GaussianSplats3D UMD (r160 matches the build version) -->
  <script src="/libs/three.min.js"></script>
  <!-- Load GaussianSplats3D from local copy (avoids CDN MIME type issues) -->
  <script src="/libs/gaussian-splats-3d.umd.js"></script>
  <script>const GaussianSplats3D = window["Gaussian Splats 3D"];</script>

  <script>
    const select = document.getElementById('dataset-select');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg = document.getElementById('overlay-msg');
    const progress = document.getElementById('progress');
    const hudName = document.getElementById('hud-name');
    const hudStatus = document.getElementById('hud-status');
    const params = new URLSearchParams(location.search);
    const datasetId = params.get('id');

    let currentViewer = null;

    function showOverlay(title, msg, pct) {
      overlay.style.display = 'flex';
      overlayTitle.textContent = title;
      overlayMsg.textContent = msg;
      progress.style.width = (pct ?? 0) + '%';
    }
    function hideOverlay() { overlay.style.display = 'none'; }

    async function loadDatasets() {
      const res = await fetch('/api/datasets');
      const datasets = await res.json();
      const compatible = datasets.filter(d => d.type === 'splat');
      select.innerHTML = '<option value="">-- select dataset --</option>' +
        compatible.map(d => `<option value="${d.id}" ${d.id === datasetId ? 'selected' : ''}>${d.name}</option>`).join('');
      if (!compatible.length) select.innerHTML = '<option>No splat datasets — add from dashboard</option>';
      if (datasetId) {
        const ds = compatible.find(d => d.id === datasetId);
        if (ds) loadSplat(ds);
      }
    }

    select.addEventListener('change', async () => {
      const id = select.value; if (!id) return;
      const res = await fetch(`/api/datasets/${id}`);
      const ds = await res.json();
      history.pushState({}, '', `?id=${id}`);
      loadSplat(ds);
    });

    async function loadSplat(ds) {
      // Destroy previous viewer
      if (currentViewer) {
        try { currentViewer.dispose(); } catch(e) {}
        document.getElementById('splat-container').innerHTML = '';
        currentViewer = null;
      }

      hudName.textContent = ds.name;
      hudStatus.textContent = 'Loading…';
      showOverlay('Loading splat', ds.name + '…', 20);

      try {
        // Check GaussianSplats3D is available
        if (typeof GaussianSplats3D === 'undefined') {
          throw new Error('GaussianSplats3D library failed to load from CDN');
        }

        showOverlay('Loading splat', 'Initializing viewer…', 40);

        currentViewer = new GaussianSplats3D.Viewer({
          rootElement: document.getElementById('splat-container'),
          sharedMemoryForWorkers: false,
          dynamicScene: false,
          gpuAcceleratedSort: true,
          halfPrecisionCovariancesOnGPU: true,
        });

        showOverlay('Loading splat', 'Downloading and decompressing…', 60);

        // addSplatScene is the correct API in v0.4.x
        await currentViewer.addSplatScene(ds.path, {
          splatAlphaRemovalThreshold: 5,
        });

        showOverlay('Loading splat', 'Starting renderer…', 90);
        currentViewer.start();
        // Override the library's hardcoded polar limits (max=135°, min=~6°)
        // to allow full vertical orbit around the splat
        if (currentViewer.controls) {
          currentViewer.controls.minPolarAngle = 0;
          currentViewer.controls.maxPolarAngle = Math.PI;
        }
        hideOverlay();
        hudStatus.textContent = 'Loaded';

      } catch (e) {
        console.error('Splat load error:', e);
        hudStatus.textContent = 'Error';
        showOverlay('Load error', e.message, 0);
        overlay.style.pointerEvents = 'none';
      }
    }

    loadDatasets();
  </script>
</body>
</html>
