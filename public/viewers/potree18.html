<!DOCTYPE html>
<!--
  potree18.html — Potree 1.8 (WebGL) point-cloud viewer

  Full Potree 1.8 viewer (EDL, sidebar with measurement/clipping tools) plus
  platform extensions:
    - Datasets panel (header button) listing type "potree" clouds to load and
      type "cesium" GLB tilesets to drape into the scene as Three.js overlays.
    - Scan-position spheres in the cloud; clicking one opens a Pannellum
      panorama overlay with scan-to-scan navigation hotspots.
    - Panorama measurement tools (point/distance/horizontal/area) that raycast
      the visible point cloud nodes (floor-plane fallback) and bridge results
      back into Potree.Measure objects so they appear in the 3D scene/sidebar.

  Input:
    ?id=<datasetId>  optional — resolved via GET /api/datasets/:id; defaults to
                     the Haus Eggiwil cloud (/data/potree/haus-eggiwil/).
                     Dataset fields used: path (Potree metadata.json), name,
                     panoramasPath (JSON with panoramas[]: path, x/y/z LV95,
                     northOffset, label, id).
    Potree also reads its own view settings from the URL (loadSettingsFromURL).

  Coordinates: the Potree scene works in raw LV95 (EPSG:2056) world metres —
  scan positions and measurements share that frame directly.

  Routing: portal.js links datasets of type "potree" here; also in header nav.
  External libs: Potree 1.8 bundle + its vendored deps from /libs/potree18/
  (jQuery, jQuery-UI, spectrum, OpenLayers, i18next, jstree, proj4, d3, tween,
  laslaz), Pannellum 2.5.6 (CDN), and Three.js r124 + GLTFLoader (CDN, loaded
  after potree.js) which provide the window.THREE used by the GLB overlay loader.
-->
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Potree 1.8 — Haus Eggiwil</title>
	<link rel="stylesheet" href="/css/portal.css">
	<link rel="stylesheet" href="../libs/potree18/build/potree.css">
	<link rel="stylesheet" href="../libs/potree18/jquery-ui/jquery-ui.min.css">
	<link rel="stylesheet" href="../libs/potree18/openlayers3/ol.css">
	<link rel="stylesheet" href="../libs/potree18/spectrum/spectrum.css">
	<link rel="stylesheet" href="../libs/potree18/jstree/themes/mixed/style.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
	<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
	<style>
		body { margin: 0; overflow: hidden; background: #111; }
		header { position: relative; z-index: 100; }

		#pano-overlay {
			display: none; position: absolute; inset: 0;
			flex-direction: column; background: #0d1117;
			z-index: 200;
		}
		#pano-overlay.open { display: flex; }
		#pano-overlay-bar {
			display: flex; align-items: center; gap: 0.8rem;
			padding: 0.4rem 0.8rem; background: #161b22;
			border-bottom: 1px solid #30363d; flex-shrink: 0;
			font-family: monospace; font-size: 0.8rem; color: #8b949e;
		}
		#pano-overlay-title { color: #f0883e; font-weight: 600; white-space: nowrap; }
		#pano-overlay-coords { flex: 1; font-size: 0.72rem; }
		#pano-close-btn {
			background: none; border: 1px solid #30363d; color: #8b949e;
			border-radius: 4px; padding: 0.15rem 0.5rem; cursor: pointer; font-size: 0.8rem;
		}
		#pano-close-btn:hover { background: #21262d; color: #e6edf3; border-color: #8b949e; }
		#pano-inner { flex: 1; position: relative; overflow: hidden; }
		#pano-div   { position: absolute; inset: 0; }
		#pano-scan-nav {
			position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
			display: flex; align-items: center; gap: 0.5rem; z-index: 10;
			background: rgba(13,17,23,0.8); border: 1px solid #30363d;
			border-radius: 6px; padding: 0.3rem 0.6rem;
			font-family: monospace; font-size: 0.8rem; color: #8b949e;
		}
		#pano-scan-nav button {
			background: none; border: 1px solid #30363d; color: #8b949e;
			border-radius: 4px; padding: 0.1rem 0.4rem; cursor: pointer; font-size: 0.8rem;
		}
		#pano-scan-nav button:hover { background: #30363d; }
		#pano-scan-nav button:disabled { opacity: 0.35; cursor: default; }
		/* ── Panorama measurement tools ── */
		#pano-measure-canvas { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
		#pano-measure-bar {
			position: absolute; top: 8px; left: 8px; z-index: 20;
			display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
			background: rgba(13,17,23,0.9); border: 1px solid #30363d; border-radius: 6px;
			padding: 0.3rem 0.5rem; font-family: monospace; font-size: 0.78rem; color: #8b949e;
		}
		.pm-btn {
			background: none; border: 1px solid #30363d; color: #8b949e;
			border-radius: 4px; padding: 0.15rem 0.5rem; cursor: pointer;

		}
		.pm-btn:hover { background: #21262d; color: #e6edf3; }
		.pm-btn.active { background: color-mix(in srgb, var(--tc) 18%, transparent); border-color: var(--tc); color: var(--tc); }
		.pm-sep { width: 1px; height: 16px; background: #30363d; margin: 0 2px; flex-shrink: 0; }
		#pano-floor-offset {
			width: 46px; background: #0d1117; border: 1px solid #30363d; color: #e6edf3;

		}
		#pano-measure-results {
			position: absolute; top: 8px; right: 8px; z-index: 20;
			background: rgba(13,17,23,0.9); border: 1px solid #30363d; border-radius: 6px;
			padding: 0.3rem 0.5rem; font-family: monospace; font-size: 0.75rem;
			display: none; max-width: 180px;
		}
		.mr-row { display: flex; gap: 0.4rem; align-items: center; margin: 1px 0; }
		.mr-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
		#pano-measure-hint {
			position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
			background: rgba(13,17,23,0.85); border: 1px solid #30363d; border-radius: 4px;
			padding: 0.25rem 0.75rem; font-family: monospace; font-size: 0.78rem; color: #8b949e;
			pointer-events: none; display: none; z-index: 20; white-space: nowrap;
		}
		#pano-measure-capture { position: absolute; inset: 0; z-index: 6; pointer-events: none; }
		body.pano-measuring #pano-measure-capture { pointer-events: all; cursor: crosshair; }
		.pnlm-hotspot.pano-nav-hotspot {
			width: 40px; height: 40px;
			background: none !important; background-image: none !important;
			border: none !important; cursor: pointer; overflow: visible; display: block;
			transition: transform 0.12s ease, filter 0.12s ease;
		}
		.pnlm-hotspot.pano-nav-hotspot:hover {
			transform: scale(1.2);
			filter: brightness(1.15) drop-shadow(0 0 8px rgba(240,136,62,0.75));
		}
		.pano-nav-popup {
			display: none; position: absolute; bottom: calc(100% + 6px);
			left: 50%; transform: translateX(-50%);
			background: rgba(13,17,23,0.95); border: 1px solid #f0883e; border-radius: 5px;
			padding: 3px 9px; font-size: 11px; color: #e6edf3;
			white-space: nowrap; pointer-events: none; z-index: 100; line-height: 1.5;
		}
		.pnlm-hotspot.pano-nav-hotspot:hover .pano-nav-popup { display: block; }

	/* ── Datasets panel ── */
	#datasets-panel {
		display: none; position: fixed; top: 56px; right: 0;
		width: 260px; max-height: calc(100vh - 56px); overflow-y: auto;
		background: #161b22; border-left: 1px solid #30363d;
		z-index: 500; font-family: monospace; font-size: 0.8rem; color: #8b949e;
	}
	.dp-header {
		display: flex; justify-content: space-between; align-items: center;
		padding: 0.55rem 0.75rem; border-bottom: 1px solid #30363d;
		font-weight: 600; color: #e6edf3; font-size: 0.82rem;
	}
	.dp-close { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 1rem; padding: 0; }
	.dp-close:hover { color: #e6edf3; }
	.dp-item { padding: 0.5rem 0.75rem; border-bottom: 1px solid #21262d; }
	.dp-item-name { color: #e6edf3; font-size: 0.8rem; margin-bottom: 0.15rem; }
	.dp-item-desc { color: #8b949e; font-size: 0.72rem; margin-bottom: 0.3rem; }
	.dp-load-btn {
		background: rgba(63,185,80,0.12); border: 1px solid rgba(63,185,80,0.4);
		color: #3fb950; border-radius: 4px; padding: 0.15rem 0.6rem;
		cursor: pointer; font-size: 0.78rem; font-family: monospace;
	}
	.dp-load-btn:hover { background: rgba(63,185,80,0.22); }
	.dp-toggle-btn {
		background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3);
		color: #58a6ff; border-radius: 4px; padding: 0.2rem 0.65rem;
		cursor: pointer; font-size: 0.82rem; font-family: monospace; white-space: nowrap;
	}
	.dp-toggle-btn:hover { background: rgba(88,166,255,0.2); }
	</style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">&#9729;</span>
      <span class="logo-text">Point Cloud Platform</span>
    </div>
    <nav>
      <a href="/">Datasets</a>
      <a href="/viewers/cesium.html">Cesium</a>
      <a href="/viewers/splat.html">Splat</a>
      <a href="/viewers/potree18.html" class="active">Potree 1.8</a>
      <a href="/viewers/potreenext.html">Potree-Next</a>
      <a href="/viewers/compare.html">Compare</a>
    </nav>
    <button class="dp-toggle-btn" onclick="toggleDatasetsPanel()">&#8857; Datasets</button>
  </header>

  <!-- Datasets panel -->
  <div id="datasets-panel">
    <div class="dp-header">
      <span>Load Dataset</span>
      <button class="dp-close" onclick="document.getElementById('datasets-panel').style.display='none'">&#x2715;</button>
    </div>
    <div id="dp-list" style="padding:0.5rem 0.75rem;color:#8b949e">Loading&hellip;</div>
  </div>

	<div class="potree_container" style="position:absolute;width:100%;height:calc(100% - 56px);left:0;top:56px;">
		<div id="potree_render_area" style="background-image:url('../libs/potree18/build/resources/images/background.jpg');">
			<!-- Panorama overlay — inside render area so sidebar stays visible -->
			<div id="pano-overlay">
		<div id="pano-overlay-bar">
			<span id="pano-overlay-title">Panorama</span>
			<span id="pano-overlay-coords"></span>
			<button id="pano-close-btn" onclick="closePanoramaOverlay()">&#x2715; Close</button>
		</div>
		<div id="pano-inner">
			<div id="pano-div"></div>
			<canvas id="pano-measure-canvas"></canvas>
			<div id="pano-measure-capture"></div>
			<div id="pano-measure-bar">
				<button class="pm-btn" data-tool="distance"   style="--tc:#58a6ff">Distance</button>
				<button class="pm-btn" data-tool="horizontal" style="--tc:#3fb950">Horiz.</button>
				<button class="pm-btn" data-tool="area"       style="--tc:#a371f7">Area</button>
				<div class="pm-sep"></div>
				<span>Floor</span>
				<input id="pano-floor-offset" type="number" value="1.5" step="0.1" min="-10" max="10">
				<span>m</span>

				<button class="pm-btn" id="pm-clear-btn">Clear</button>
			</div>
			<div id="pano-measure-results"></div>

			<div id="pano-scan-nav">
				<button id="pano-btn-prev">&#8592; Prev</button>
				<span id="pano-scan-label">Scan 1 / 1</span>

			</div><!-- /pano-scan-nav -->
			</div><!-- /pano-inner -->
		</div><!-- /pano-overlay -->
		</div><!-- /potree_render_area -->
		<div id="potree_sidebar_container"></div>
	</div><!-- /potree_container -->

	<!-- Potree 1.8 vendored dependencies (load order matters — potree.js expects
	     jQuery & co. to exist). Three.js + GLTFLoader come last and supply the
	     window.THREE used by the GLB overlay loader below. -->
	<script src="../libs/potree18/jquery/jquery-3.1.1.min.js"></script>
	<script src="../libs/potree18/spectrum/spectrum.js"></script>
	<script src="../libs/potree18/jquery-ui/jquery-ui.min.js"></script>
	<script src="../libs/potree18/other/BinaryHeap.js"></script>
	<script src="../libs/potree18/tween/tween.min.js"></script>
	<script src="../libs/potree18/d3/d3.js"></script>
	<script src="../libs/potree18/proj4/proj4.js"></script>
	<script src="../libs/potree18/openlayers3/ol.js"></script>
	<script src="../libs/potree18/i18next/i18next.js"></script>
	<script src="../libs/potree18/jstree/jstree.js"></script>
	<script src="../libs/potree18/build/potree.js"></script>
	<script src="../libs/potree18/plasio/js/laslaz.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/loaders/GLTFLoader.js"></script>

	<script type="module">
		// ── Dataset helpers ──────────────────────────────────────────────────────
		function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
		function escAttr(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

		// Load an additional Potree point cloud from the datasets panel.
		window.loadPotreeDataset = function(path, name) {
			Potree.loadPointCloud(path, name || path, e => {
				const pc = e.pointcloud;
				pc.material.size = 1;
				pc.material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
				pc.material.shape = Potree.PointShape.SQUARE;
				pc.material.activeAttributeName = "rgba";
				viewer.scene.addPointCloud(pc);
				viewer.fitToScreen();
			});
			document.getElementById('datasets-panel').style.display = 'none';
		};

		// ── GLB overlay loader for cesium/3D-Tiles datasets ──────────────────────
		// Drapes a building model into the Potree scene: fetches the tileset.json,
		// picks the highest-detail .glb (lod0 preferred), and transforms it from
		// glTF local space into the LV95 world frame via asset.extras.lv95Origin.
		const _glbOverlays = new Map(); // tilesetUrl → THREE.Group

		window.loadGlbOverlay = async function(tilesetUrl, name) {
			document.getElementById('datasets-panel').style.display = 'none';

			if (_glbOverlays.has(tilesetUrl)) {
				console.log('[GLB] already loaded:', tilesetUrl);
				return;
			}

			let json;
			try {
				const r = await fetch(tilesetUrl);
				json = await r.json();
			} catch(e) {
				console.error('[GLB] failed to fetch tileset:', tilesetUrl, e);
				return;
			}

			const origin = json.asset?.extras?.lv95Origin;
			if (!origin) {
				console.error('[GLB] tileset missing lv95Origin in asset.extras');
				return;
			}

			// Collect all .glb content URIs from the tile tree
			const glbUris = [];
			function collectGlb(tile) {
				const uri = tile?.content?.uri;
				if (uri?.endsWith('.glb')) glbUris.push(uri);
				for (const child of (tile.children || [])) collectGlb(child);
			}
			collectGlb(json.root);

			if (!glbUris.length) {
				console.error('[GLB] no .glb content found in tileset');
				return;
			}

			// Pick best LOD: prefer lod0, else lod1, else lod2, else first
			const pick = (suffix) => glbUris.find(u => u.includes(suffix));
			const chosen = pick('lod0') || pick('lod1') || pick('lod2') || glbUris[0];
			const base = tilesetUrl.substring(0, tilesetUrl.lastIndexOf('/') + 1);
			const glbUrl = base + chosen;

			console.log(`[GLB] loading ${glbUrl} for "${name}"`);

			const loader = new THREE.GLTFLoader();
			loader.load(glbUrl, gltf => {
				const group = gltf.scene;

				// glTF is Y-up; Potree 1.8 scene is Z-up (LV95).
				// Blender→glTF: (bx,by,bz)→(gx,gy,gz) = (bx, bz, -by)
				// Inverse: bx=gx, by=-gz, bz=gy
				// LV95 = Blender + origin, so:
				//   scene_x = gltf_x  + origin[0]
				//   scene_y = -gltf_z + origin[1]
				//   scene_z = gltf_y  + origin[2]
				const m = new THREE.Matrix4();
				m.set(
					1, 0,  0, origin[0],
					0, 0, -1, origin[1],
					0, 1,  0, origin[2],
					0, 0,  0, 1
				);
				group.applyMatrix4(m);

				viewer.scene.scene.add(group);
				_glbOverlays.set(tilesetUrl, group);
				console.log(`[GLB] added "${name}" to scene`);
			}, undefined, e => {
				console.error('[GLB] failed to load GLB:', glbUrl, e);
			});
		};

		window.toggleGlbOverlay = function(tilesetUrl) {
			const group = _glbOverlays.get(tilesetUrl);
			if (group) group.visible = !group.visible;
		};

		// ── Datasets panel (header button) ───────────────────────────────────────
		// Lists "potree" clouds (Load) and "cesium" tilesets (Load GLB) from the API.
		window.toggleDatasetsPanel = async function() {
			const panel = document.getElementById('datasets-panel');
			if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
			panel.style.display = 'block';
			const list = document.getElementById('dp-list');
			list.innerHTML = 'Loading&hellip;';
			try {
				const res = await fetch('/api/datasets');
				const all = await res.json();
				const potreeDs  = all.filter(d => d.type === 'potree');
				const cesiumDs  = all.filter(d => d.type === 'cesium');
				if (!potreeDs.length && !cesiumDs.length) {
					list.innerHTML = '<div style="padding:0.25rem 0;color:#484f58">No datasets available.</div>';
					return;
				}
				list.innerHTML = '';
				for (const d of potreeDs) {
					const item = document.createElement('div');
					item.className = 'dp-item';
					item.innerHTML = `<div class="dp-item-name">${escHtml(d.name)}</div>` +
						(d.description ? `<div class="dp-item-desc">${escHtml(d.description)}</div>` : '') +
						`<button class="dp-load-btn">Load</button>`;
					item.querySelector('.dp-load-btn').addEventListener('click', () => loadPotreeDataset(d.path, d.name));
					list.appendChild(item);
				}
				if (cesiumDs.length) {
					const hdr = document.createElement('div');
					hdr.style.cssText = 'padding:0.4rem 0 0.2rem;font-size:0.7rem;color:#8b949e;text-transform:uppercase;letter-spacing:.05em';
					hdr.textContent = '3D Models (GLB overlay)';
					list.appendChild(hdr);
					for (const d of cesiumDs) {
						const item = document.createElement('div');
						item.className = 'dp-item';
						item.innerHTML = `<div class="dp-item-name">${escHtml(d.name)}</div>` +
							(d.description ? `<div class="dp-item-desc">${escHtml(d.description)}</div>` : '') +
							`<button class="dp-load-btn">Load GLB</button>`;
						item.querySelector('.dp-load-btn').addEventListener('click', () => loadGlbOverlay(d.path, d.name));
						list.appendChild(item);
					}
				}
			} catch(e) {
				list.innerHTML = `<div style="padding:0.25rem 0;color:#f85149">Error: ${escHtml(e.message)}</div>`;
			}
		};

		// ── Resolve initial dataset from ?id= param ──────────────────────────────
		const _dsId = new URLSearchParams(location.search).get('id');
		let _initialPath = '/data/potree/haus-eggiwil/metadata.json';
		let _initialName = 'Haus Eggiwil';
		let _panoPath = '/data/panoramas/haus-eggiwil/metadata.json';
		if (_dsId) {
			try {
				const _r = await fetch(`/api/datasets/${_dsId}`);
				if (_r.ok) {
					const _ds = await _r.json();
					if (_ds.path) { _initialPath = _ds.path; _initialName = _ds.name || _dsId; }
					_panoPath = _ds.panoramasPath || null;
				}
			} catch(e) { console.warn('Failed to resolve dataset', _dsId, e); }
		}

		// ── Potree viewer init ───────────────────────────────────────────────────
		window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

		viewer.setEDLEnabled(true);
		viewer.setFOV(60);
		viewer.setPointBudget(2_000_000);
		viewer.loadSettingsFromURL();
		viewer.setBackground("gradient");

		viewer.loadGUI(() => {
			viewer.setLanguage('en');
			$("#menu_tools").next().show();
			$("#menu_clipping").next().show();
			viewer.toggleSidebar();
		});

		// ── Panorama viewer ──────────────────────────────────────────────────
		let panoViewer = null;
		let panos = [];
		let panoIdx = 0;

		window.openPanorama = function(scan) {
			const idx = panos.findIndex(p => p.id === scan.id);
			panoIdx = idx >= 0 ? idx : 0;
			document.getElementById('pano-overlay').classList.add('open');
			loadPanoScan(panoIdx);
			resizePanoMeasureCanvas();
			if (!measRafRunning) { measRafRunning = true; requestAnimationFrame(drawPanoMeasureCanvas); }
			installPanoInterceptor();
			// Hide tool-select buttons — Potree sidebar is the control interface now
			document.querySelectorAll('#pano-measure-bar .pm-btn[data-tool], #pano-measure-bar .pm-sep').forEach(el => el.style.display = 'none');
			// Gray out tools not available in panorama mode
			document.querySelectorAll('#tools img.button-icon').forEach(img => {
				const src = img.getAttribute('src') || '';
				if (/angle|azimuth|volume/.test(src)) {
					img.dataset.panoDisabled = '1';
					img.style.opacity = '0.25';
					img.style.pointerEvents = 'none';
				}
			});
		};

		window.closePanoramaOverlay = function() {
			uninstallPanoInterceptor();
			if (panoViewer) { panoViewer.destroy(); panoViewer = null; }
			document.getElementById('pano-overlay').classList.remove('open');
			resetMeasTool();
			document.querySelectorAll('#pano-measure-bar .pm-btn[data-tool], #pano-measure-bar .pm-sep').forEach(el => el.style.display = '');
			// Restore grayed-out tools
			document.querySelectorAll('#tools img.button-icon[data-pano-disabled]').forEach(img => {
				delete img.dataset.panoDisabled;
				img.style.opacity = '';
				img.style.pointerEvents = '';
			});
		};

		function panoCameraSVG(s) {
			return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 56 56" style="display:block">
				<circle cx="28" cy="28" r="28" fill="rgba(240,136,62,0.25)"/>
				<circle cx="28" cy="28" r="20" fill="#f0883e" stroke="white" stroke-width="2.5"/>
				<rect x="16" y="21" width="24" height="15" rx="3" fill="white"/>
				<rect x="22" y="17" width="12" height="6" rx="2" fill="white"/>
				<circle cx="28" cy="28.5" r="5.5" fill="#f0883e"/>
			</svg>`;
		}

		function computePanoHotspots(idx) {
			const cur = panos[idx];
			if (cur.x == null) return [];
			return panos
				.map((p, i) => {
					if (i === idx) return null;
					const dx = p.x - cur.x, dy = p.y - cur.y, dz = p.z - cur.z;
					const horiz = Math.sqrt(dx*dx + dy*dy);
					const dist  = Math.sqrt(dx*dx + dy*dy + dz*dz);
					if (dist < 0.1) return null;
					const bearing = Math.atan2(dx, dy) * 180 / Math.PI;
					const pitch   = Math.atan2(dz, horiz) * 180 / Math.PI;
					let yaw = bearing - (cur.northOffset || 0);
					while (yaw >  180) yaw -= 360;
					while (yaw < -180) yaw += 360;
					return { i, p, dist, horiz, dz, yaw, pitch };
				})
				.filter(r => r !== null && r.horiz <= 10)
				.sort((a, b) => a.horiz - b.horiz)
				.map(({ i, p, dist, dz, yaw, pitch }) => {
					const distLabel = dist < 10 ? `${dist.toFixed(1)}m` : `${Math.round(dist)}m`;
					const label = (p.label || `Scan ${i + 1}`).replace('240906_Gr3_', '');
					const floorNote = dz > 1.5 ? ' ▲' : dz < -1.5 ? ' ▼' : '';
					const size = Math.round(Math.max(24, Math.min(56, 60 / Math.sqrt(Math.max(dist, 0.5)))));
					return {
						type: 'info', pitch, yaw,
						cssClass: 'pano-nav-hotspot',
						createTooltipFunc: (div, args) => {
							const s = args.size;
							div.style.width = s + 'px'; div.style.height = s + 'px';
							div.innerHTML = panoCameraSVG(s) +
								`<div class="pano-nav-popup">${args.label}${args.floorNote}<br>` +
								`<span style="color:#8b949e">${args.distLabel}</span></div>`;
						},
						createTooltipArgs: { size, distLabel, label, floorNote },
						clickHandlerFunc: (_e, args) => {
							let initYaw = 0;
							if (panoViewer) {
								const compass = panoViewer.getYaw() + (panos[panoIdx].northOffset || 0);
								initYaw = compass - (panos[args.navIdx].northOffset || 0);
							}
							loadPanoScan(args.navIdx, initYaw);
						},
						clickHandlerArgs: { navIdx: i },
					};
				});
		}

		function loadPanoScan(idx, initYaw = 0) {
			panoIdx = idx;
			const p = panos[idx];
			document.getElementById('pano-overlay-title').textContent = p.label || `Scan ${idx + 1}`;
			document.getElementById('pano-overlay-coords').textContent =
				`X: ${p.x.toFixed(2)}  Y: ${p.y.toFixed(2)}  Z: ${p.z.toFixed(2)}`;
			document.getElementById('pano-scan-label').textContent = `Scan ${idx + 1} / ${panos.length}`;
			document.getElementById('pano-btn-prev').disabled = (idx === 0);
			document.getElementById('pano-btn-next').disabled = (idx === panos.length - 1);
			if (panoViewer) { panoViewer.destroy(); panoViewer = null; }
			panoViewer = pannellum.viewer('pano-div', {
				type: 'equirectangular', panorama: p.path,
				autoLoad: true, autoRotate: 0, compass: true,
				northOffset: p.northOffset || 0, yaw: initYaw,
				hfov: 100, minHfov: 30, maxHfov: 150,
				hotSpots: computePanoHotspots(idx),
				showControls: true, showZoomCtrl: true, showFullscreenCtrl: true,
			});
		}

		document.getElementById('pano-btn-prev').addEventListener('click', () => {
			if (panoIdx > 0) loadPanoScan(panoIdx - 1);
		});
		document.getElementById('pano-btn-next').addEventListener('click', () => {
			if (panoIdx < panos.length - 1) loadPanoScan(panoIdx + 1);
		});

		// ── Panorama measurement tools ─────────────────────────────────────────
		const MTC = {
			point:      { hex: '#f0883e', label: 'Point' },
			distance:   { hex: '#58a6ff', label: 'Distance' },
			horizontal: { hex: '#3fb950', label: 'Horiz.' },
			area:       { hex: '#a371f7', label: 'Area' },
		};
		let activeMeasTool = null;    // 'point' | 'distance' | 'horizontal' | 'area' | null
		let curMeasPts = [];          // in-progress LV95 points for the active tool
		let measurements = [];        // committed: {id, num, tool, display, pts}
		let measureCount = 0;         // running label number shown on the canvas
		let measRafRunning = false;   // guards the overlay rAF loop
		let bridgedMeasures = [];     // Potree.Measure objects created from pano tools

		// Minimal Vector3 stand-in with just the methods Potree.Measure.addMarker
		// touches — avoids depending on which THREE build owns the global.
		function mkVec3(x, y, z) {
			const v = {
				x, y, z,
				clone()       { return mkVec3(this.x, this.y, this.z); },
				copy(o)       { this.x = o.x; this.y = o.y; this.z = o.z; return this; },
				toArray()     { return [this.x, this.y, this.z]; },
				distanceTo(o) { return Math.sqrt((this.x-o.x)**2+(this.y-o.y)**2+(this.z-o.z)**2); },
				sub(o)        { this.x -= o.x; this.y -= o.y; this.z -= o.z; return this; },
				add(o)        { this.x += o.x; this.y += o.y; this.z += o.z; return this; },
				multiplyScalar(s) { this.x *= s; this.y *= s; this.z *= s; return this; },
				normalize()   {
					const l = Math.sqrt(this.x**2+this.y**2+this.z**2) || 1;
					this.x /= l; this.y /= l; this.z /= l; return this;
				},
			};
			return v;
		}

		// Mirror a committed pano measurement into the 3D scene as a real
		// Potree.Measure so it shows up in the viewer and the sidebar list.
		function bridgeToPotree18(tool, pts) {
			if (!pts.length) return;
			const m = new Potree.Measure();
			m.name = `Pano ${tool}`;
			m.showDistances = (tool !== 'area' && tool !== 'point');
			m.showArea = (tool === 'area');
			m.closed = (tool === 'area');
			m.showAngles = false;
			m.showCoordinates = (tool === 'point');
			for (const pt of pts) m.addMarker(mkVec3(pt.x, pt.y, pt.z));
			viewer.scene.addMeasurement(m);
			bridgedMeasures.push(m);
			$('#menu_measurements').next().slideDown();
		}

		// CPU raycast against the currently *visible* (loaded LOD) point cloud
		// nodes: keep the nearest point inside a narrow cone around the ray
		// (radius grows with distance, maxCone rad ≈ 0.46°). Brute force, but the
		// visible-node budget keeps the point count manageable.
		function raycastPointCloud18(origin, dir) {
			const pcs = viewer.scene.pointclouds;
			if (!pcs?.length) return null;
			let bestT = Infinity, bestPt = null;
			const maxCone = 0.008;
			for (const pc of pcs) {
				for (const node of (pc.visibleNodes || [])) {
					const gn = node.geometryNode;
					if (!gn?.geometry?.attributes?.position) continue;
					const m = node.sceneNode?.matrixWorld?.elements;
					if (!m) continue;
					const ox = m[12], oy = m[13], oz = m[14];
					const arr = gn.geometry.attributes.position.array;
					const n = gn.numPoints;
					for (let i = 0; i < n; i++) {
						const px = arr[i*3  ] + ox - origin.x;
						const py = arr[i*3+1] + oy - origin.y;
						const pz = arr[i*3+2] + oz - origin.z;
						const t = px*dir.x + py*dir.y + pz*dir.z;
						if (t < 0.05) continue;
						if ((px*px+py*py+pz*pz) - t*t > (maxCone*t)**2) continue;
						if (t < bestT) { bestT = t; bestPt = { x: arr[i*3]+ox, y: arr[i*3+1]+oy, z: arr[i*3+2]+oz }; }
					}
				}
			}
			return bestPt;
		}

		// Pano click → LV95 point: build a world ray from the scan position
		// (northOffset converts view yaw to compass bearing), try the point cloud
		// first, otherwise intersect a floor plane at scan Z − #pano-floor-offset.
		function panoPick(yawDeg, pitchDeg) {
			const scan = panos[panoIdx];
			if (!scan || scan.x == null) return null;
			const pitchRad = pitchDeg * Math.PI / 180;
			const bearing = (yawDeg + (scan.northOffset || 0)) * Math.PI / 180;
			const cp = Math.cos(pitchRad);
			const dir = { x: Math.sin(bearing)*cp, y: Math.cos(bearing)*cp, z: Math.sin(pitchRad) };
			const origin = { x: scan.x, y: scan.y, z: scan.z };
			const hit = raycastPointCloud18(origin, dir);
			if (hit) return hit;
			// Floor-plane fallback
			const floorOffset = parseFloat(document.getElementById('pano-floor-offset').value) || 1.5;
			if (Math.abs(dir.z) < 0.02) return null;
			const t = -floorOffset / dir.z;
			if (t <= 0) return null;
			return { x: scan.x + t*dir.x, y: scan.y + t*dir.y, z: scan.z - floorOffset };
		}

		// Inverse of panoPick's ray: direction from the current scan to an LV95
		// point, as view-relative yaw/pitch.
		function lv95ToPanoYawPitch(pt) {
			const scan = panos[panoIdx];
			const dx = pt.x - scan.x, dy = pt.y - scan.y, dz = pt.z - scan.z;
			const horiz = Math.sqrt(dx*dx + dy*dy);
			const bearing = Math.atan2(dx, dy) * 180 / Math.PI;
			const pitch = Math.atan2(dz, horiz) * 180 / Math.PI;
			let yaw = bearing - (scan.northOffset || 0);
			while (yaw >  180) yaw -= 360;
			while (yaw < -180) yaw += 360;
			return { yaw, pitch };
		}

		// Perspective-project a yaw/pitch direction into overlay-canvas pixels by
		// decomposing it onto the camera's right/up/forward basis (matches the
		// Pannellum view). `behind` marks points >90° from the view direction.
		function yawPitchToMeasCanvas(yaw, pitch) {
			if (!panoViewer) return null;
			const hfov = panoViewer.getHfov();
			if (!hfov || !isFinite(hfov) || hfov <= 0) return null;
			const canvas = document.getElementById('pano-measure-canvas');
			if (!canvas.width || !canvas.height) return null;
			const toRad = Math.PI / 180;
			const ptY = yaw * toRad, ptP = pitch * toRad;
			const cY = panoViewer.getYaw() * toRad, cP = panoViewer.getPitch() * toRad;
			const px = Math.cos(ptP)*Math.sin(ptY), py = Math.sin(ptP), pz = Math.cos(ptP)*Math.cos(ptY);
			const fx = Math.cos(cP)*Math.sin(cY), fy = Math.sin(cP), fz = Math.cos(cP)*Math.cos(cY);
			const rx = Math.cos(cY), rz = -Math.sin(cY);
			const ux = -Math.sin(cP)*Math.sin(cY), uy = Math.cos(cP), uz = -Math.sin(cP)*Math.cos(cY);
			const dotFwd = px*fx + py*fy + pz*fz;
			const dotRight = px*rx + pz*rz;
			const dotUp = px*ux + py*uy + pz*uz;
			const safeFwd = dotFwd <= 0 ? 0.05 : dotFwd;
			const tanH2 = Math.tan(hfov * toRad / 2);
			if (!tanH2 || !isFinite(tanH2)) return null;
			const cx = canvas.width / 2, cy = canvas.height / 2, f = cx / tanH2;
			const x = cx + f * dotRight / safeFwd, y = cy - f * dotUp / safeFwd;
			if (!isFinite(x) || !isFinite(y)) return null;
			return { x, y, behind: dotFwd <= 0 };
		}

		function projectMeasPts(pts) {
			const canvas = document.getElementById('pano-measure-canvas');
			return pts.map((pt, i) => {
				const yw = lv95ToPanoYawPitch(pt);
				if (!yw) return null;
				const pos = yawPitchToMeasCanvas(yw.yaw, yw.pitch);
				if (!pos) return null;
				const vis = !pos.behind && pos.x >= 0 && pos.x <= canvas.width && pos.y >= 0 && pos.y <= canvas.height;
				return { x: pos.x, y: pos.y, i, vis };
			}).filter(Boolean);
		}

		function resizePanoMeasureCanvas() {
			const inner = document.getElementById('pano-inner');
			const canvas = document.getElementById('pano-measure-canvas');
			const rect = inner.getBoundingClientRect();
			canvas.width  = Math.max(1, Math.round(rect.width));
			canvas.height = Math.max(1, Math.round(rect.height));
		}

		function drawMeasCircles(ctx, spts, color) {
			if (spts.length >= 2) {
				ctx.strokeStyle = color; ctx.lineWidth = 1.8;
				ctx.beginPath(); ctx.moveTo(spts[0].x, spts[0].y);
				for (let j = 1; j < spts.length; j++) ctx.lineTo(spts[j].x, spts[j].y);
				ctx.stroke();
			}
			for (const sp of spts) {
				ctx.beginPath(); ctx.arc(sp.x, sp.y, 8, 0, Math.PI * 2);
				ctx.fillStyle = color; ctx.fill();
				ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.stroke();
			}
		}

		// rAF loop while the overlay is open: reprojects committed + in-progress
		// measurements from LV95 every frame so they track the pano camera.
		function drawPanoMeasureCanvas() {
			const canvas = document.getElementById('pano-measure-canvas');
			const ctx = canvas.getContext('2d');
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			if (panoViewer) {
				for (const m of measurements) {
					if (!m.pts?.length) continue;
					const spts = projectMeasPts(m.pts);
					if (!spts.length) continue;
					const mhex = MTC[m.tool]?.hex || '#fff';
					if (m.tool === 'area' && spts.length >= 3) {
						ctx.beginPath(); ctx.moveTo(spts[0].x, spts[0].y);
						for (let j = 1; j < spts.length; j++) ctx.lineTo(spts[j].x, spts[j].y);
						ctx.closePath();
						ctx.fillStyle = mhex + '33'; ctx.fill();
						ctx.strokeStyle = mhex; ctx.lineWidth = 1.8; ctx.stroke();
						for (const sp of spts) {
							if (!sp.vis) continue;
							ctx.beginPath(); ctx.arc(sp.x, sp.y, 8, 0, Math.PI * 2);
							ctx.fillStyle = mhex; ctx.fill();
							ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.stroke();
						}
					} else {
						drawMeasCircles(ctx, spts.filter(p => p.vis), mhex);
					}
					const vpts = spts.filter(p => p.vis);
					const lpts = vpts.length ? vpts : spts;
					const mx = lpts.reduce((s, p) => s + p.x, 0) / lpts.length;
					const my = lpts.reduce((s, p) => s + p.y, 0) / lpts.length;
					const ny = m.tool === 'area' ? my : my - 18;
					ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
					ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(13,17,23,0.9)';
					ctx.strokeText(String(m.num), mx, ny);
					ctx.fillStyle = '#e6edf3'; ctx.fillText(String(m.num), mx, ny);
					ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
				}
				if (activeMeasTool && curMeasPts.length > 0) {
					const spts = projectMeasPts(curMeasPts);
					if (spts.length) {
						const ahex = MTC[activeMeasTool]?.hex || '#fff';
						if (activeMeasTool === 'area' && spts.length >= 3) {
							ctx.beginPath(); ctx.moveTo(spts[0].x, spts[0].y);
							for (let j = 1; j < spts.length; j++) ctx.lineTo(spts[j].x, spts[j].y);
							ctx.closePath();
							ctx.fillStyle = ahex + '22'; ctx.fill();
							ctx.strokeStyle = ahex; ctx.lineWidth = 1.8; ctx.stroke();
							for (const sp of spts) {
								if (!sp.vis) continue;
								ctx.beginPath(); ctx.arc(sp.x, sp.y, 8, 0, Math.PI * 2);
								ctx.fillStyle = ahex; ctx.fill();
								ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.stroke();
							}
						} else {
							drawMeasCircles(ctx, spts.filter(p => p.vis), ahex);
						}
					}
				}
			}
			if (document.getElementById('pano-overlay').classList.contains('open')) {
				requestAnimationFrame(drawPanoMeasureCanvas);
			} else {
				measRafRunning = false;
			}
		}

		function activatePanoTool(tool) {
			resetMeasTool();
			activeMeasTool = tool;
			document.querySelector(`.pm-btn[data-tool="${tool}"]`)?.classList.add('active');
			document.getElementById('pano-measure-hint').style.display = 'block';
			document.body.classList.add('pano-measuring');
		}

		function resetMeasTool() {
			activeMeasTool = null; curMeasPts = [];
			document.querySelectorAll('.pm-btn[data-tool]').forEach(b => b.classList.remove('active'));
			document.getElementById('pano-measure-hint').style.display = 'none';
			document.body.classList.remove('pano-measuring');
		}

		// While the pano overlay is open, hijack clicks on the Potree sidebar's
		// measurement-tool icons (capture phase) and start the matching pano tool
		// instead — the sidebar stays the single control surface for measuring.
		let _panoInterceptor = null;
		function installPanoInterceptor() {
			if (_panoInterceptor) return;
			_panoInterceptor = (e) => {
				const img = e.target;
				if (!img.classList?.contains('button-icon')) return;
				const src = img.getAttribute('src') || '';
				let tool = null;
				if (/\/point\.svg/.test(src)) tool = 'point';
				else if (/\/distance\.svg/.test(src)) tool = 'distance';
				else if (/\/height\.svg/.test(src)) tool = 'horizontal';
				else if (/\/area\.svg/.test(src)) tool = 'area';
				else if (/\/circle\.svg/.test(src)) tool = 'area';
				if (!tool) return;
				e.stopImmediatePropagation();
				activatePanoTool(tool);
			};
			document.addEventListener('click', _panoInterceptor, true);
		}
		function uninstallPanoInterceptor() {
			if (_panoInterceptor) {
				document.removeEventListener('click', _panoInterceptor, true);
				_panoInterceptor = null;
			}
		}

		function fmt(m) { return m < 100 ? m.toFixed(2) + ' m' : m.toFixed(1) + ' m'; }

		function commitMeasurement(tool, display) {
			const pts = [...curMeasPts];
			measurements.push({ id: Date.now(), num: ++measureCount, tool, display, pts });
			curMeasPts = [];
			resetMeasTool();
			renderMeasResults();
			bridgeToPotree18(tool, pts);
		}

		function doPoint() {
			const pt = curMeasPts[0];
			commitMeasurement('point', `${pt.x.toFixed(2)}, ${pt.y.toFixed(2)}, ${pt.z.toFixed(2)}`);
		}
		function doDistance() {
			const [p1, p2] = curMeasPts;
			commitMeasurement('distance', fmt(Math.sqrt((p2.x-p1.x)**2+(p2.y-p1.y)**2+(p2.z-p1.z)**2)));
		}
		function doHorizontal() {
			const [p1, p2] = curMeasPts;
			commitMeasurement('horizontal', fmt(Math.sqrt((p2.x-p1.x)**2+(p2.y-p1.y)**2)));
		}
		function doArea() {
			if (curMeasPts.length < 3) return;
			let area = 0;   // shoelace formula on the horizontal (x/y) projection
			const n = curMeasPts.length;
			for (let i = 0; i < n; i++) {
				const a = curMeasPts[i], b = curMeasPts[(i+1) % n];
				area += a.x * b.y - b.x * a.y;
			}
			area = Math.abs(area) / 2;
			commitMeasurement('area', area < 100 ? area.toFixed(2) + ' m²' : area.toFixed(1) + ' m²');
		}

		function renderMeasResults() {
			const el = document.getElementById('pano-measure-results');
			if (!measurements.length) { el.style.display = 'none'; return; }
			el.style.display = 'block';
			el.innerHTML = measurements.map(m =>
				`<div class="mr-row">
					<span style="color:#8b949e;min-width:14px">${m.num}</span>
					<div class="mr-dot" style="background:${MTC[m.tool].hex}"></div>
					<span style="color:#e6edf3">${m.display}</span>
				</div>`
			).join('');
		}

		document.querySelectorAll('.pm-btn[data-tool]').forEach(btn => {
			btn.addEventListener('click', () => {
				const tool = btn.dataset.tool;
				if (activeMeasTool === tool) { resetMeasTool(); return; }
				resetMeasTool();
				activeMeasTool = tool;
				btn.classList.add('active');
				document.getElementById('pano-measure-hint').style.display = 'block';
				document.body.classList.add('pano-measuring');
			});
		});

		document.getElementById('pm-clear-btn').addEventListener('click', () => {
			for (const m of bridgedMeasures) viewer.scene.removeMeasurement(m);
			bridgedMeasures = [];
			measurements = []; measureCount = 0;
			resetMeasTool();
			renderMeasResults();
		});

		// Pano click → yaw/pitch: unproject the pixel through the camera basis
		// (inverse of yawPitchToMeasCanvas), then panoPick() resolves it to LV95.
		document.getElementById('pano-measure-capture').addEventListener('mousedown', e => {
			if (e.button !== 0 || !activeMeasTool || !panoViewer) return;
			const div = document.getElementById('pano-div');
			const rect = div.getBoundingClientRect();
			const dx = e.clientX - (rect.left + rect.width  / 2);
			const dy = e.clientY - (rect.top  + rect.height / 2);
			const toRad = Math.PI / 180;
			const f  = (rect.width / 2) / Math.tan(panoViewer.getHfov() * toRad / 2);
			const cY = panoViewer.getYaw()   * toRad;
			const cP = panoViewer.getPitch() * toRad;
			const rx = Math.cos(cY),                   rz = -Math.sin(cY);
			const ux = -Math.sin(cP)*Math.sin(cY), uy = Math.cos(cP), uz = -Math.sin(cP)*Math.cos(cY);
			const fx = Math.cos(cP)*Math.sin(cY),  fy = Math.sin(cP), fz = Math.cos(cP)*Math.cos(cY);
			const dr = dx / f, du = -dy / f;
			const wx = dr*rx + du*ux + fx;
			const wy =         du*uy + fy;
			const wz = dr*rz + du*uz + fz;
			const yaw   = Math.atan2(wx, wz) * 180 / Math.PI;
			const pitch = Math.atan2(wy, Math.sqrt(wx*wx + wz*wz)) * 180 / Math.PI;
			const pt = panoPick(yaw, pitch);
			if (!pt) return;
			e.stopPropagation();
			curMeasPts.push(pt);
			if (activeMeasTool === 'point' && curMeasPts.length === 1) doPoint();
			else if (activeMeasTool === 'distance' && curMeasPts.length === 2) doDistance();
			else if (activeMeasTool === 'horizontal' && curMeasPts.length === 2) doHorizontal();
		});

		document.getElementById('pano-measure-capture').addEventListener('contextmenu', e => {
			if (!activeMeasTool) return;
			e.preventDefault(); e.stopPropagation();
			if (activeMeasTool === 'area' && curMeasPts.length >= 3) doArea();
			else resetMeasTool();
		});

		document.addEventListener('keydown', e => {
			if (!document.getElementById('pano-overlay').classList.contains('open')) return;
			if (e.key === 'Escape') resetMeasTool();
			else if (e.key === 'Backspace' && activeMeasTool === 'area' && curMeasPts.length > 0) {
				e.preventDefault(); curMeasPts.pop();
			}
		});

		window.addEventListener('resize', () => {
			if (document.getElementById('pano-overlay').classList.contains('open')) resizePanoMeasureCanvas();
		});

		// ── Point cloud + scan markers ────────────────────────────────────────
		Potree.loadPointCloud(_initialPath, _initialName, e => {
			const scene = viewer.scene;
			const pointcloud = e.pointcloud;

			pointcloud.material.size = 1;
			pointcloud.material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
			pointcloud.material.shape = Potree.PointShape.SQUARE;
			pointcloud.material.activeAttributeName = "rgba";

			scene.addPointCloud(pointcloud);
			viewer.fitToScreen();

			if (!_panoPath) return;
			fetch(_panoPath)
				.then(r => r.json())
				.then(meta => {
					panos = meta.panoramas;
					const threeScene = viewer.scene.scene;
					const markerData = panos.map(scan => {
						// viewer.scene.scene uses LV95 world coordinates — no offset subtraction needed
						const marker = Potree.Utils.debugSphere(
							threeScene,
							{x: scan.x, y: scan.y, z: scan.z},
							0.3, 0xf0883e
						);
						return {marker, scan};
					});

					// Click detection: project each sphere center to screen, find closest to click
					const canvas = viewer.renderer.domElement;
					let mouseDownPos = null;
					canvas.addEventListener('mousedown', (e) => {
						mouseDownPos = {x: e.clientX, y: e.clientY};
					});
					canvas.addEventListener('click', (e) => {
						if (document.getElementById('pano-overlay').classList.contains('open')) return;
						// Ignore clicks that were actually drags
						if (mouseDownPos && (Math.abs(e.clientX - mouseDownPos.x) > 5 || Math.abs(e.clientY - mouseDownPos.y) > 5)) return;

						const rect = canvas.getBoundingClientRect();
						const clickX = e.clientX - rect.left;
						const clickY = e.clientY - rect.top;
						const camera = viewer.scene.getActiveCamera();
						const w = rect.width;
						const h = rect.height;

						let closest = null;
						let closestDist = 20; // pixel threshold

						for (const {marker, scan} of markerData) {
							const pos = marker.position.clone();
							pos.project(camera);
							if (pos.z > 1 || pos.z < -1) continue;
							const sx = (pos.x + 1) / 2 * w;
							const sy = (1 - pos.y) / 2 * h;
							const d = Math.hypot(sx - clickX, sy - clickY);
							if (d < closestDist) { closest = scan; closestDist = d; }
						}

						if (closest) openPanorama(closest);
					});
				});
		});
	</script>
</body>
