<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cesium Viewer – Point Cloud Platform</title>
  <link rel="stylesheet" href="/css/portal.css">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; }
    #cesiumContainer { position: absolute; inset: 0; top: 100px; width: 100%; height: calc(100vh - 100px); }
    .toolbar-label { color: #8b949e; font-size: 0.8rem; }
    #info-panel {
      position: absolute;
      left: 10px; bottom: 30px;
      background: rgba(22,27,34,0.88);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: #e6edf3;
      font-size: 0.8rem;
      max-width: 260px;
      z-index: 20;
      pointer-events: none;
    }
    #info-panel h4 { margin-bottom: 0.3rem; color: #3fb950; }
    /* Shift Cesium's widgets down so they don't sit behind our header */
    .cesium-viewer-toolbar,
    .cesium-viewer-geocoderContainer,
    .cesium-navigation-help-button,
    .cesium-viewer-animationContainer { margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">&#9729;</span>
      <span class="logo-text">Point Cloud Platform</span>
    </div>
    <nav>
      <a href="/">Datasets</a>
      <a href="/viewers/potree.html">Point Cloud</a>
      <a href="/viewers/cesium.html" class="active">Cesium</a>
      <a href="/viewers/splat.html">Splat</a>
      <a href="/viewers/panorama.html">Panorama</a>
      <a href="/viewers/compare.html">Compare</a>
    </nav>
  </header>

  <div class="viewer-toolbar">
    <span class="viewer-title">Cesium Viewer</span>
    <span class="toolbar-label">Dataset:</span>
    <select id="dataset-select"><option value="">Loading...</option></select>
  </div>

  <div id="cesiumContainer"></div>
  <div id="info-panel">
    <h4>Cesium Viewer</h4>
    <p>Select a dataset above to load a 3D Tiles model.</p>
  </div>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWUxNy1mMWZiLTQzYjYtYTQ0OS1kMWFjYmFkNjc4ZDkiLCJpZCI6NTc3MzMsImlhdCI6MTYyNzg0NTE4Mn0.XcKpgANiY19MC4bdFUXMVEBToBmqS8kuYpUlxJHYZxk';

    const viewer = new Cesium.Viewer('cesiumContainer', {
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false,
      geocoder: true,
      homeButton: true,
      infoBox: false,
      sceneModePicker: true,
      selectionIndicator: false,
      timeline: false,
      navigationHelpButton: true,
      scene3DOnly: false,
      // Disable terrain so local (non-georeferenced) tilesets sit correctly
      terrainProvider: new Cesium.EllipsoidTerrainProvider(),
    });

    // Dark background
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0d1117');
    viewer.scene.skyBox = undefined;
    viewer.scene.sun = undefined;
    viewer.scene.moon = undefined;
    viewer.scene.skyAtmosphere = undefined;

    const params = new URLSearchParams(location.search);
    const datasetId = params.get('id');
    const select = document.getElementById('dataset-select');
    let currentTileset = null;

    // Helper: fly camera to show the current tileset properly
    function flyToTileset() {
      if (!currentTileset) return;
      const sphere = currentTileset.boundingSphere;
      const offset = new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(45),
        Cesium.Math.toRadians(-30),
        sphere.radius * 3.0
      );
      viewer.camera.flyToBoundingSphere(sphere, { offset, duration: 1.5 });
    }

    // Override home button to fly to the loaded tileset instead of Earth
    viewer.homeButton.viewModel.command.beforeExecute.addEventListener(e => {
      if (currentTileset) {
        e.cancel = true;
        flyToTileset();
      }
    });

    // Re-zoom to tileset after 2D ↔ 3D ↔ Columbus mode transitions
    viewer.scene.morphComplete.addEventListener(() => {
      if (currentTileset) {
        // Short delay lets Cesium finish the transition first
        setTimeout(flyToTileset, 300);
      }
    });

    async function loadDatasets() {
      const res = await fetch('/api/datasets');
      const datasets = await res.json();
      const compatible = datasets.filter(d => d.type === 'cesium');
      select.innerHTML = '<option value="">-- select dataset --</option>' +
        compatible.map(d =>
          `<option value="${d.id}" ${d.id === datasetId ? 'selected' : ''}>${d.name}</option>`
        ).join('');
      if (!compatible.length) {
        select.innerHTML = '<option value="">No Cesium datasets</option>';
        return;
      }
      // Auto-load first dataset if none specified
      const id = datasetId || compatible[0].id;
      const ds = compatible.find(d => d.id === id);
      if (ds) {
        if (!datasetId) select.value = ds.id;
        loadTileset(ds);
      }
    }

    select.addEventListener('change', async () => {
      const id = select.value;
      if (!id) return;
      const res = await fetch(`/api/datasets/${id}`);
      history.pushState({}, '', `?id=${id}`);
      loadTileset(await res.json());
    });

    async function loadTileset(ds) {
      if (currentTileset) {
        viewer.scene.primitives.remove(currentTileset);
        currentTileset = null;
      }
      document.getElementById('info-panel').innerHTML =
        `<h4 style="color:#58a6ff">Loading…</h4><p style="color:#8b949e">${ds.name}</p>`;
      try {
        const url = ds.path.startsWith('http')
          ? ds.path
          : window.location.origin + ds.path;

        currentTileset = await Cesium.Cesium3DTileset.fromUrl(url);
        viewer.scene.primitives.add(currentTileset);

        // Initial fly-to
        flyToTileset();

        document.getElementById('info-panel').innerHTML = `
          <h4>${ds.name}</h4>
          <p style="color:#8b949e">${ds.source || 'unknown source'}</p>
          <p style="margin-top:0.3rem">${ds.description || ''}</p>
        `;
      } catch (e) {
        console.error(e);
        document.getElementById('info-panel').innerHTML = `
          <h4 style="color:#f85149">Load Error</h4>
          <p style="color:#8b949e">${e.message}</p>
        `;
      }
    }

    loadDatasets();
  </script>
</body>
</html>
