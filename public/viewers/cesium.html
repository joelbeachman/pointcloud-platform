<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cesium Viewer – Point Cloud Platform</title>
  <link rel="stylesheet" href="/css/portal.css">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; }
    #cesiumContainer { position: absolute; inset: 0; top: 100px; width: 100%; height: calc(100vh - 100px); }
    .toolbar-label { color: #8b949e; font-size: 0.8rem; }
    #info-panel {
      position: absolute;
      right: 10px; top: 110px;
      background: rgba(22,27,34,0.9);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #e6edf3;
      font-size: 0.8rem;
      max-width: 220px;
      z-index: 20;
    }
    #info-panel h4 { margin-bottom: 0.5rem; color: #3fb950; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">&#9729;</span>
      <span class="logo-text">Point Cloud Platform</span>
    </div>
    <nav>
      <a href="/">Datasets</a>
      <a href="/viewers/potree.html">Potree</a>
      <a href="/viewers/cesium.html" class="active">Cesium</a>
      <a href="/viewers/splat.html">Splat</a>
      <a href="/viewers/panorama.html">Panorama</a>
    </nav>
  </header>

  <div class="viewer-toolbar">
    <span class="viewer-title">Cesium Viewer</span>
    <span class="toolbar-label">Dataset:</span>
    <select id="dataset-select"><option value="">Loading...</option></select>
    <span class="toolbar-label" style="margin-left:1rem;">Terrain:</span>
    <select id="terrain-select">
      <option value="none">None</option>
      <option value="cesium" selected>Cesium World Terrain</option>
    </select>
  </div>

  <div id="cesiumContainer"></div>
  <div id="info-panel">
    <h4>Cesium Viewer</h4>
    <p>Visualize georeferenced 3D Tiles point clouds on a globe. Select a dataset above or add one from the <a href="/" style="color:#58a6ff;">dashboard</a>.</p>
  </div>

  <script>
    // Cesium Ion token — uses default for open datasets
    // Replace with your own token from cesium.com/ion for full access
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWUxNy1mMWZiLTQzYjYtYTQ0OS1kMWFjYmFkNjc4ZDkiLCJpZCI6NTc3MzMsImlhdCI6MTYyNzg0NTE4Mn0.XcKpgANiY19MC4bdFUXMVEBToBmqS8kuYpUlxJHYZxk';

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: new Cesium.CesiumTerrainProvider({
        url: Cesium.IonResource.fromAssetId(1),
      }),
      animation: false,
      baseLayerPicker: false,
      fullscreenButton: false,
      vrButton: false,
      geocoder: true,
      homeButton: true,
      infoBox: true,
      sceneModePicker: true,
      selectionIndicator: true,
      timeline: false,
      navigationHelpButton: true,
      scene3DOnly: false,
    });

    // Dark sky
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0d1117');
    viewer.scene.skyBox = undefined;
    viewer.scene.sun = undefined;
    viewer.scene.moon = undefined;
    viewer.scene.skyAtmosphere = undefined;

    const params = new URLSearchParams(location.search);
    const datasetId = params.get('id');
    const select = document.getElementById('dataset-select');
    const terrainSelect = document.getElementById('terrain-select');
    let currentTileset = null;

    terrainSelect.addEventListener('change', () => {
      if (terrainSelect.value === 'cesium') {
        viewer.terrainProvider = new Cesium.CesiumTerrainProvider({
          url: Cesium.IonResource.fromAssetId(1),
        });
      } else {
        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
      }
    });

    async function loadDatasets() {
      const res = await fetch('/api/datasets');
      const datasets = await res.json();
      const compatible = datasets.filter(d => d.type === 'cesium');
      select.innerHTML = '<option value="">-- select dataset --</option>' +
        compatible.map(d => `<option value="${d.id}" ${d.id === datasetId ? 'selected' : ''}>${d.name}</option>`).join('');
      if (compatible.length === 0) {
        select.innerHTML = '<option value="">No Cesium datasets — add from dashboard</option>';
      }
      if (datasetId) {
        const ds = compatible.find(d => d.id === datasetId);
        if (ds) loadTileset(ds);
      }
    }

    select.addEventListener('change', async () => {
      const id = select.value;
      if (!id) return;
      const res = await fetch(`/api/datasets/${id}`);
      const ds = await res.json();
      history.pushState({}, '', `?id=${id}`);
      loadTileset(ds);
    });

    async function loadTileset(ds) {
      if (currentTileset) viewer.scene.primitives.remove(currentTileset);
      try {
        currentTileset = viewer.scene.primitives.add(
          new Cesium.Cesium3DTileset({ url: ds.path })
        );
        await currentTileset.readyPromise;
        viewer.zoomTo(currentTileset, new Cesium.HeadingPitchRange(0, -Math.PI / 4, currentTileset.boundingSphere.radius * 2));
        document.getElementById('info-panel').innerHTML = `
          <h4>${ds.name}</h4>
          <p style="color:#8b949e">Source: ${ds.source || 'unknown'}</p>
          <p style="margin-top:0.4rem">${ds.description || '3D Tiles point cloud loaded.'}</p>
        `;
      } catch(e) {
        console.error('Tileset load error:', e);
        document.getElementById('info-panel').innerHTML = `
          <h4 style="color:#f85149">Load Error</h4>
          <p style="color:#8b949e">${e.message}</p>
        `;
      }
    }

    // Load sample open dataset — Cesium OSM Buildings as demo
    async function loadDemo() {
      const osmBuildings = await Cesium.createOsmBuildingsAsync();
      viewer.scene.primitives.add(osmBuildings);
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(13.404954, 52.520008, 400),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-35), roll: 0 },
        duration: 2,
      });
      document.getElementById('info-panel').innerHTML = `
        <h4>Demo: OSM Buildings</h4>
        <p style="color:#8b949e">Cesium OSM Buildings (Berlin)</p>
        <p style="margin-top:0.4rem">Add your own georeferenced 3D Tiles dataset from the <a href="/" style="color:#58a6ff;">dashboard</a>.</p>
      `;
    }

    loadDatasets().then(() => {
      if (!datasetId) loadDemo();
    });
  </script>
</body>
</html>
