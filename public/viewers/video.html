<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <link rel="stylesheet" href="/css/portal.css">
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; background: #0d1117; color: #e6edf3; }
    .vid-toolbar {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 1rem; background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 0.85rem;
    }
    .vid-toolbar a { color: #58a6ff; text-decoration: none; }
    .vid-toolbar a:hover { text-decoration: underline; }
    .vid-toolbar .title { font-weight: 600; }
    .vid-toolbar .meta  { color: #8b949e; }
    .vid-toolbar .spacer { flex: 1; }
    .vid-stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #000;
    }
    .vid-stage video, .vid-stage iframe {
      width: 100%; height: 100%; border: 0; max-height: 100%; background: #000;
    }
    .error { padding: 2rem; color: #f85149; }
  </style>
</head>
<body>
  <div class="vid-toolbar">
    <a href="/">&larr; Datasets</a>
    <span class="title" id="vid-title">Video</span>
    <span class="meta" id="vid-meta"></span>
    <span class="spacer"></span>
    <a id="vid-open-tab" target="_blank" rel="noopener" style="font-size:0.78rem">Quelle öffnen ↗</a>
  </div>
  <div class="vid-stage" id="vid-stage"></div>

  <script>
    (async () => {
      const id = new URLSearchParams(location.search).get('id');
      const titleEl = document.getElementById('vid-title');
      const metaEl  = document.getElementById('vid-meta');
      const stage   = document.getElementById('vid-stage');
      const openTab = document.getElementById('vid-open-tab');

      if (!id) { document.body.innerHTML = '<div class="error">No dataset id given.</div>'; return; }
      try {
        const res = await fetch('/api/datasets/' + encodeURIComponent(id));
        if (!res.ok) throw new Error('Dataset ' + id + ' not found');
        const ds = await res.json();
        titleEl.textContent = ds.name || 'Video';
        const parts = [];
        if (ds.building)    parts.push('Gebäude ' + ds.building);
        if (ds.description) parts.push(ds.description);
        metaEl.textContent = parts.length ? '· ' + parts.join(' · ') : '';
        openTab.href = ds.path || '#';

        if (ds.youtubeId) {
          const p = new URLSearchParams({ autoplay: '1', rel: '0' });
          if (ds.start != null) p.set('start', ds.start);
          if (ds.end   != null) p.set('end',   ds.end);
          stage.innerHTML = `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(ds.youtubeId)}?${p}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>`;
        } else {
          stage.innerHTML = `<video controls autoplay src="${encodeURI(ds.path)}"></video>`;
        }
      } catch (e) {
        document.body.innerHTML = '<div class="error">' + e.message + '</div>';
      }
    })();
  </script>
</body>
</html>
